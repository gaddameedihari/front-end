<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript essentials Demo</title>
</head>
<body>
    

    <h1>JavaScript Essentials </h1>
    <script>
        // variables
       console.log("==== Variables ====");

       let studentname = "haricharan";
       let age = 20;

       const college = "MRU";

       console.log(studentname);
       console.log(age);
       console.log(college);

       studentname = "Afsar";
       console.log(studentname);
    

       // operators
           console.log("==== Operator ====");       
    let a = 30;
    let b = 20;
    

    console.log("Addition:", a + b);
    console.log("Substraction",a - b);
    console.log("Multiplication",a * b);
    console.log("Division",a / b);

    console.log(a > b);
    console.log(a < b);
    console.log(a == b);

    console.log(true && false);
    console.log(true || false);
    console.log(!true);

    //control flow
    console.log("==== If Else ====");

    let marks = 75;

    if(marks >= 35){
        console.log("Pass");
    }   
    else{
        console.log("Fail");
    }       

    console.log("==== Switch Case ====");
    let day = 6;

    switch(day){
        case 1:
            console.log("Monday");
            break;
        case 2:
            console.log("Tuesday");
            break;
        case 3:
            console.log("Wednesday");
            break;
        case 4:
            console.log("Thursday");
            break;
        case 5:
            console.log("Friday");
            break;
        case 6:
            console.log("Saturday");
            break;
        case 7:
            console.log("Sunday");
            break;
        default:
            console.log("Invalid Day");
    }
    </script>
</body>
</html>
