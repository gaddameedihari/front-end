<!DOCTYPE html>
<html>
<head>
    <title>Console Log Example</title>
</head>
<body>

<script>
let name = "haricharan";
let age = 20;
console.log("Name: " + name);
console.log("Age: " + age);

// Control Flow
console.log("==== If Else ====");

let marks = 75;

if (marks >= 35) {
    console.log("Pass");
} else {
    console.log("Fail");
}

// Arithmetic Operators
let a = 10;
let b = 5;

console.log("Addition: " + (a + b));
console.log("Subtraction: " + (a - b));
console.log("Multiplication: " + (a * b));
console.log("Division: " + (a / b));
console.log("Modulus: " + (a % b));

console.log(a > b);
console.log(a < b);
console.log(a == b);

console.log(true && false);

// Switch Case
let day = 3;

switch (day) {
    case 1:
        console.log("Monday");
        break;

    case 2:
        console.log("Tuesday");
        break;

    case 3:
        console.log("Wednesday");
        break;

    case 4:
        console.log("Thursday");
        break;

    default:
        console.log("Invalid");
}
//-------------------------------
console.log("=== Functions ===");
function welcome(){
    console.log("Welcome Sudents");
}
welcome();

function add(x,y){

    return x+y;

}

console.log(add(20,50));

/*Arrow Function*/
 const greet = () => {
    console.log("Hello Students");
 }

 greet();

</script>

</body>
</html>
